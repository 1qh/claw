services:
  timescaledb:
    image: timescale/timescaledb-ha:pg17
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: uniclaw
      POSTGRES_USER: uniclaw
      POSTGRES_PASSWORD: uniclaw
    volumes:
      - tsdb_data:/home/postgres/pgdata/data
  tigerfs:
    build:
      context: .
      dockerfile: Dockerfile.tigerfs
    depends_on:
      - timescaledb
    privileged: true
    volumes:
      - ./mnt:/mnt/tigerfs:rshared
    command:
      - mount
      - postgresql://uniclaw:uniclaw@timescaledb:5432/uniclaw
      - /mnt/tigerfs
      - --foreground
  clamav:
    image: clamav/clamav:stable
    ports:
      - '3310:3310'
volumes:
  tsdb_data:
