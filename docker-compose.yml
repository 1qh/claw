services:
  timescaledb:
    image: timescale/timescaledb-ha:pg17
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: uniclaw
      POSTGRES_USER: uniclaw
      POSTGRES_PASSWORD: uniclaw
    volumes:
      - tsdb_data:/home/postgres/pgdata/data

  gateway:
    image: ghcr.io/openclaw/openclaw:latest
    depends_on:
      - timescaledb
    privileged: true
    user: root
    ports:
      - '18789:18789'
    environment:
      DATABASE_URL: postgresql://uniclaw:uniclaw@timescaledb:5432/uniclaw
      OLLAMA_HOST: http://host.docker.internal:11434
      TIGERFS_MOUNT_PATH: /mnt/tigerfs
      GATEWAY_PORT: '18789'
    volumes:
      - gateway_state:/root/.openclaw
      - ./gateway-init.sh:/gateway-init.sh:ro
    entrypoint: ['/bin/bash', '/gateway-init.sh']

  clamav:
    image: clamav/clamav:stable
    ports:
      - '3310:3310'

volumes:
  tsdb_data:
  gateway_state:
