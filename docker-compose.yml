services:
  timescaledb:
    image: timescale/timescaledb-ha:pg18
    ports:
      - '5433:5432'
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - tsdb_data:/home/postgres/pgdata/data
      - ./db-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
  gateway:
    image: ghcr.io/openclaw/openclaw:2026.3.24
    depends_on:
      - timescaledb
    privileged: true
    user: root
    ports:
      - '18789:18789'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/postgres
      OLLAMA_HOST: http://host.docker.internal:11434
      TIGERFS_MOUNT_PATH: /mnt/tigerfs
      GATEWAY_PORT: '18789'
      OPENCLAW_MODEL: ${OPENCLAW_MODEL:?OPENCLAW_MODEL is required in .env}
      GATEWAY_PASSWORD: ${GATEWAY_PASSWORD:?GATEWAY_PASSWORD is required in .env}
    volumes:
      - ./gateway-init.sh:/gateway-init.sh:ro
      - ./tigerfs-rename-shim.c:/tigerfs-rename-shim.c:ro
    entrypoint: ['/bin/bash', '/gateway-init.sh']
  vscode:
    image: gitpod/openvscode-server:latest
    depends_on:
      - timescaledb
    privileged: true
    user: root
    ports:
      - '3333:3333'
    environment:
      DATABASE_URL_READONLY: postgresql://vscode_readonly:vscode_readonly@timescaledb:5432/postgres
      TIGERFS_MOUNT_PATH: /mnt/tigerfs
    volumes:
      - ./vscode-init.sh:/vscode-init.sh:ro
      - ./vscode-settings.json:/vscode-settings.json:ro
      - ./vscode-settings.json:/home/workspace/.openvscode-server/data/User/settings.json:ro
      - ./vscode-settings.json:/home/workspace/.openvscode-server/data/Machine/settings.json:ro
      - ./tigerfs-rename-shim.c:/tigerfs-rename-shim.c:ro
      - ./tigerfs-bin:/usr/local/bin/tigerfs:ro
    entrypoint: ['/bin/bash', '/vscode-init.sh']
  clamav:
    image: clamav/clamav-debian:latest
    ports:
      - '3310:3310'
volumes:
  tsdb_data:
