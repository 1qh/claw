services:
  timescaledb:
    image: timescale/timescaledb-ha:pg18
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: uniclaw
      POSTGRES_USER: uniclaw
      POSTGRES_PASSWORD: uniclaw
    volumes:
      - tsdb_data:/home/postgres/pgdata/data
  gateway:
    image: ghcr.io/openclaw/openclaw:latest
    depends_on:
      - timescaledb
    privileged: true
    user: root
    ports:
      - '18789:18789'
    environment:
      DATABASE_URL: postgresql://uniclaw:uniclaw@timescaledb:5432/uniclaw
      OLLAMA_HOST: http://host.docker.internal:11434
      TIGERFS_MOUNT_PATH: /mnt/tigerfs
      GATEWAY_PORT: '18789'
      OPENCLAW_MODEL: ${OPENCLAW_MODEL:-qwen3.5:4b-q4_K_M}
    volumes:
      - ./gateway-init.sh:/gateway-init.sh:ro
      - ./tigerfs-rename-shim.c:/tigerfs-rename-shim.c:ro
    entrypoint: ['/bin/bash', '/gateway-init.sh']
  vscode:
    image: gitpod/openvscode-server:latest
    depends_on:
      - timescaledb
    privileged: true
    user: root
    ports:
      - '3333:3333'
    environment:
      DATABASE_URL: postgresql://uniclaw:uniclaw@timescaledb:5432/uniclaw
      TIGERFS_MOUNT_PATH: /mnt/tigerfs
    volumes:
      - ./vscode-init.sh:/vscode-init.sh:ro
      - ./tigerfs-rename-shim.c:/tigerfs-rename-shim.c:ro
    entrypoint: ['/bin/bash', '/vscode-init.sh']
  clamav:
    image: clamav/clamav-debian:latest
    ports:
      - '3310:3310'
volumes:
  tsdb_data:
